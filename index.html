<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arjun Precision Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white antialiased overflow-x-hidden">

    <!-- Onboarding Screen -->
    <div id="onboarding" class="fixed inset-0 z-[200] bg-black flex items-center justify-center p-8 hidden">
        <div class="w-full max-w-sm space-y-8">
            <h2 class="text-4xl font-black tracking-tighter">Setup your day.</h2>
            <div class="space-y-4">
                <div class="bg-white/5 p-6 rounded-[32px] flex justify-between items-center">
                    <span class="text-xs font-black text-gray-500 uppercase">Wake Up</span>
                    <input type="time" id="setup-wake" value="08:00" class="bg-transparent text-red-400 font-black text-2xl outline-none">
                </div>
                <div class="bg-white/5 p-6 rounded-[32px] flex justify-between items-center">
                    <span class="text-xs font-black text-gray-500 uppercase">Sleep</span>
                    <input type="time" id="setup-sleep" value="22:00" class="bg-transparent text-blue-400 font-black text-2xl outline-none">
                </div>
            </div>
            <button onclick="finishOnboarding()" class="w-full py-5 bg-white text-black font-black rounded-3xl text-xl active:scale-95 transition">Start Planning</button>
        </div>
    </div>

    <header class="p-8 pb-4">
        <h1 class="text-2xl font-black tracking-tight" id="greeting">Hi Arjun!</h1>
        <p class="text-gray-500 text-sm font-bold mt-1" id="streak-info">🔥 Let's start your streak!</p>
    </header>

    <!-- Month View -->
    <section class="px-4 mb-6">
        <div class="bg-[#111] rounded-[32px] p-6 border border-white/5">
            <div class="flex justify-between items-center mb-6">
                <button onclick="changeMonth(-1)" class="text-gray-500">❮</button>
                <h2 id="month-label" class="text-red-400 font-black uppercase tracking-[0.2em] text-[10px]"></h2>
                <button onclick="changeMonth(1)" class="text-gray-500">❯</button>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
        </div>
    </section>

    <!-- Week View + Timeline -->
    <section class="px-4 mb-48">
        <div class="flex justify-between items-center mb-6 px-2">
            <button onclick="changeWeek(-1)" class="text-[10px] font-black text-gray-500 uppercase">Prev</button>
            <h3 class="text-lg font-black tracking-tighter" id="week-label">This Week</h3>
            <button onclick="changeWeek(1)" class="text-[10px] font-black text-gray-500 uppercase">Next</button>
        </div>

        <div class="flex bg-[#080808] rounded-[48px] border border-white/5 h-[1000px] relative overflow-hidden shadow-2xl">
            <!-- Time Axis Sidebar -->
            <div id="time-axis" class="w-14 border-r border-white/5 relative h-full text-[9px] text-gray-700 font-black text-center">
                <!-- Hourly labels generated by JS -->
            </div>

            <!-- 7 Columns -->
            <div id="timeline-columns" class="flex flex-1 relative h-full">
                <!-- Columns injected by JS -->
            </div>
        </div>
    </section>

    <!-- Bottom Command Center -->
    <div class="fixed bottom-8 left-4 right-4 max-w-md mx-auto z-50">
        <div class="bg-[#1c1c1e]/90 backdrop-blur-3xl border border-white/10 rounded-[35px] p-4 flex items-center justify-between shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-3xl" id="footer-emoji">😴</div>
                <div>
                    <p id="footer-status" class="text-[10px] text-blue-400 font-black uppercase tracking-widest">Active</p>
                    <p id="footer-title" class="text-base font-black">Plan your day</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="tickLastTask()" id="tick-btn" class="w-10 h-10 rounded-full border-2 border-white/10 flex items-center justify-center transition-all active:scale-90">
                    <i data-lucide="check" class="text-green-400 opacity-0 transition-opacity" stroke-width="4"></i>
                </button>
                <button onclick="toggleModal(true)" class="bg-red-400 text-black w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
                    <i data-lucide="plus" stroke-width="4"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-end">
        <div class="w-full bg-[#1c1c1e] rounded-t-[60px] p-10 border-t border-white/10 shadow-2xl">
            <div class="flex justify-between items-center mb-10">
                <button onclick="toggleModal(false)" class="text-gray-500 font-bold uppercase text-[10px]">Close</button>
                <button onclick="saveNewTask()" class="text-blue-400 font-black text-lg">Add Task</button>
            </div>
            <div class="flex items-center gap-6 mb-10">
                <input type="text" id="in-emoji" placeholder="📸" class="w-24 h-24 bg-white/5 text-5xl text-center rounded-[35px] border-none outline-none">
                <input type="text" id="in-title" placeholder="Activity Title" class="flex-1 bg-transparent text-3xl font-black border-none outline-none text-white">
            </div>
            <div class="space-y-6">
                <div class="bg-white/5 p-8 rounded-[40px] flex justify-between items-center">
                    <div class="flex flex-col gap-2">
                        <span class="text-[10px] text-gray-500 font-black uppercase">Start</span>
                        <input type="time" id="in-start" value="12:00" oninput="calculateEndTime()" class="bg-transparent text-red-400 font-black text-3xl border-none outline-none">
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <span class="text-[10px] text-gray-500 font-black uppercase">End</span>
                        <input type="time" id="in-end" value="12:30" class="bg-transparent text-white font-black text-3xl border-none outline-none text-right">
                    </div>
                </div>
                <div class="bg-white/5 p-4 rounded-[30px] flex gap-3 overflow-x-auto no-scrollbar">
                    <button onclick="setDur(15, this)" class="dur-pill px-6 py-2 bg-white/5 rounded-full text-xs font-black text-gray-500">15m</button>
                    <button onclick="setDur(30, this)" class="dur-pill active px-6 py-2 bg-white/5 rounded-full text-xs font-black text-gray-500">30m</button>
                    <button onclick="setDur(60, this)" class="dur-pill px-6 py-2 bg-white/5 rounded-full text-xs font-black text-gray-500">1h</button>
                    <button onclick="setDur(120, this)" class="dur-pill px-6 py-2 bg-white/5 rounded-full text-xs font-black text-gray-500">2h</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

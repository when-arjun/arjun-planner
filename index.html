<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arjun's Week Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white selection:bg-red-500/30 overflow-x-hidden">

    <header class="p-6 pt-10">
        <h1 class="text-2xl font-bold tracking-tight" id="greeting">Hi Arjun!</h1>
        <p class="text-gray-500 text-sm font-medium mt-1" id="streak-text">🔥 Let's start your streak!</p>
    </header>

    <section class="px-4 mb-6">
        <div class="bg-[#111] rounded-3xl p-5 border border-white/5">
            <div class="flex justify-between items-center mb-4">
                <button onclick="navMonth(-1)" class="text-gray-500">❮</button>
                <h2 id="month-label" class="text-red-400 font-black uppercase tracking-widest text-[10px]">JUNE 2026</h2>
                <button onclick="navMonth(1)" class="text-gray-500">❯</button>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
        </div>
    </section>

    <section class="px-4 relative mb-44">
        <!-- Week Day Numbers -->
        <div class="flex ml-12 mb-2" id="week-numbers-header">
            <!-- JS generates numbers 28, 29, 30... -->
        </div>

        <div class="flex bg-[#080808] rounded-[40px] border border-white/5 min-h-[1000px] relative overflow-hidden">
            <!-- Time Sidebar -->
            <div class="w-12 border-r border-white/5 pt-20 flex flex-col justify-between pb-20 text-[9px] text-gray-700 font-black text-center" style="height: 1000px;">
                <span>9 AM</span><span>10 AM</span><span>11 AM</span><span>12 PM</span><span>1 PM</span><span>2 PM</span><span>3 PM</span><span>4 PM</span><span>5 PM</span><span>6 PM</span><span>7 PM</span><span>8 PM</span><span>9 PM</span><span>10 PM</span><span>11 PM</span><span>12 AM</span>
            </div>

            <!-- 7 Columns -->
            <div id="week-columns" class="flex flex-1 h-full">
                <!-- Columns injected here -->
            </div>
        </div>
    </section>

    <!-- Footer Command Bar -->
    <div class="fixed bottom-8 left-4 right-4 max-w-md mx-auto z-50">
        <div class="bg-[#1c1c1e]/90 backdrop-blur-3xl border border-white/10 rounded-[32px] p-4 flex items-center justify-between shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-2xl" id="footer-emoji">⏰</div>
                <div>
                    <p id="footer-time-label" class="text-[10px] text-blue-400 font-black uppercase tracking-widest">Active Task</p>
                    <p id="footer-task-title" class="text-sm font-bold">Nothing active</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="markActiveTaskDone()" id="tick-btn" class="w-10 h-10 rounded-full border-2 border-white/10 flex items-center justify-center transition-all active:scale-90">
                    <i data-lucide="check" class="text-green-400 opacity-0 transition-opacity" size="20"></i>
                </button>
                <button onclick="openModal()" class="bg-red-400 text-black p-3 rounded-full shadow-lg shadow-red-400/20">
                    <i data-lucide="plus" size="24" stroke-width="3"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-end">
        <div class="w-full bg-[#1c1c1e] rounded-t-[50px] p-10 border-t border-white/10">
            <div class="flex justify-between items-center mb-10">
                <button onclick="closeModal()" class="text-gray-500 font-bold">Cancel</button>
                <button onclick="saveTask()" class="text-blue-400 font-black text-lg">Add Activity</button>
            </div>
            <div class="flex items-center gap-6 mb-10">
                <input type="text" id="in-emoji" placeholder="📸" class="w-24 h-24 bg-white/5 text-5xl text-center rounded-[32px] border-none outline-none">
                <input type="text" id="in-title" placeholder="What are you doing?" class="flex-1 bg-transparent text-3xl font-black border-none outline-none">
            </div>
            <div class="space-y-6">
                <div class="bg-white/5 p-6 rounded-[32px] flex justify-between">
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] text-gray-500 font-black uppercase">Start</span>
                        <input type="time" id="in-start" value="12:00" oninput="syncTimes()" class="bg-transparent text-red-400 font-black text-2xl border-none outline-none">
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <span class="text-[10px] text-gray-500 font-black uppercase">End</span>
                        <input type="time" id="in-end" value="12:30" class="bg-transparent text-white font-black text-2xl border-none outline-none text-right">
                    </div>
                </div>
                <div class="bg-white/5 p-4 rounded-[32px] flex gap-2 overflow-x-auto no-scrollbar">
                    <button onclick="setDur(15, this)" class="dur-pill px-6 py-2 bg-white/5 rounded-full text-xs font-black">15m</button>
                    <button onclick="setDur(30, this)" class="dur-pill active px-6 py-2 bg-white/5 rounded-full text-xs font-black">30m</button>
                    <button onclick="setDur(60, this)" class="dur-pill px-6 py-2 bg-white/5 rounded-full text-xs font-black">1h</button>
                    <button onclick="setDur(120, this)" class="dur-pill px-6 py-2 bg-white/5 rounded-full text-xs font-black">2h</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arjun's Week Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white selection:bg-red-500/30 overflow-x-hidden">

    <!-- Header with Dynamic Greeting -->
    <header class="p-6 pt-10">
        <h1 class="text-2xl font-bold tracking-tight" id="greeting">Hi Arjun!</h1>
        <p class="text-gray-500 text-sm font-medium mt-1" id="streak-text">🔥 Calculating...</p>
    </header>

    <!-- Calendar Month View -->
    <section class="px-4 mb-6">
        <div class="bg-[#111] rounded-3xl p-5 border border-white/5">
            <div class="flex justify-between items-center mb-4">
                <button onclick="navMonth(-1)" class="text-gray-500 p-2">❮</button>
                <h2 id="month-label" class="text-red-400 font-black uppercase tracking-widest text-[10px]"></h2>
                <button onclick="navMonth(1)" class="text-gray-500 p-2">❯</button>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
        </div>
    </section>

    <!-- Main Timeline Section -->
    <section class="px-4 relative mb-40">
        <div class="flex items-center justify-between mb-6 px-2">
            <div class="flex gap-2" id="week-header-labels">
                <!-- Days generated by JS -->
            </div>
        </div>

        <!-- The Grid Canvas -->
        <div class="flex bg-[#080808] rounded-[40px] border border-white/5 relative min-h-[1200px] overflow-hidden">
            <!-- Time Reference Axis (9AM, 10AM...) -->
            <div class="w-12 border-r border-white/5 pt-20 flex flex-col gap-[60px] text-[9px] text-gray-700 font-black text-center" id="time-axis">
                <span>9 AM</span><span>10 AM</span><span>11 AM</span><span>12 PM</span><span>1 PM</span><span>2 PM</span><span>3 PM</span><span>4 PM</span><span>5 PM</span><span>6 PM</span><span>7 PM</span><span>8 PM</span><span>9 PM</span><span>10 PM</span><span>11 PM</span>
            </div>

            <!-- 7 Columns for the Week -->
            <div id="week-columns" class="flex flex-1">
                <!-- Columns injected here -->
            </div>
        </div>
    </section>

    <!-- Command Footer -->
    <div class="fixed bottom-6 left-4 right-4 max-w-md mx-auto z-50">
        <div class="bg-[#1c1c1e]/90 backdrop-blur-2xl border border-white/10 rounded-3xl p-4 flex items-center justify-between shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-2xl" id="footer-icon">⏰</div>
                <div>
                    <p id="footer-time" class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">8:15 AM</p>
                    <p id="footer-title" class="text-sm font-semibold">Rise and Shine</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <!-- Tick Box (Point 5) -->
                <button onclick="toggleActiveTask()" id="tick-btn" class="w-8 h-8 rounded-full border-2 border-white/20 flex items-center justify-center transition-all">
                    <i data-lucide="check" class="text-green-400 scale-0 transition-transform" size="16"></i>
                </button>
                <button onclick="openModal()" class="bg-red-400 text-black p-3 rounded-full active:scale-90 transition">
                    <i data-lucide="plus" size="24"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex items-end">
        <div class="w-full bg-[#1c1c1e] rounded-t-[45px] p-8 border-t border-white/10">
            <div class="flex justify-between items-center mb-8">
                <button onclick="closeModal()" class="text-gray-500">Cancel</button>
                <button onclick="saveTask()" class="text-blue-400 font-bold">Add Task</button>
            </div>
            <div class="flex items-center gap-4 mb-8">
                <input type="text" id="in-emoji" placeholder="📸" class="w-20 h-20 bg-white/5 text-4xl text-center rounded-3xl border-none outline-none">
                <input type="text" id="in-title" placeholder="Activity Name" class="flex-1 bg-transparent text-2xl font-bold border-none outline-none">
            </div>
            <div class="space-y-4">
                <div class="bg-white/5 p-5 rounded-3xl flex justify-between">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-gray-500 font-bold uppercase">Start</span>
                        <input type="time" id="in-start" value="12:00" oninput="syncTimes()" class="bg-transparent text-red-400 font-black text-xl border-none outline-none">
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[10px] text-gray-500 font-bold uppercase">End</span>
                        <input type="time" id="in-end" value="12:30" class="bg-transparent text-white font-black text-xl border-none outline-none text-right">
                    </div>
                </div>
                <div class="bg-white/5 p-5 rounded-3xl overflow-x-auto no-scrollbar flex gap-2">
                    <button onclick="setDur(15, this)" class="dur-pill px-5 py-2 bg-white/5 rounded-xl text-xs font-bold">15m</button>
                    <button onclick="setDur(30, this)" class="dur-pill active px-5 py-2 bg-white/5 rounded-xl text-xs font-bold">30m</button>
                    <button onclick="setDur(60, this)" class="dur-pill px-5 py-2 bg-white/5 rounded-xl text-xs font-bold">1h</button>
                    <button onclick="setDur(120, this)" class="dur-pill px-5 py-2 bg-white/5 rounded-xl text-xs font-bold">2h</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

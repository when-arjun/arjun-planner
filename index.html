<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Arjun | Structured</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white antialiased">

    <!-- Premium Header -->
    <header class="sticky top-0 z-50 bg-black/60 backdrop-blur-2xl px-6 pt-12 pb-4">
        <h1 class="text-2xl font-black tracking-tight" id="greeting">Hi Arjun!</h1>
        <p class="text-zinc-500 text-sm font-bold mt-1" id="streak-info">🔥 Start your streak today</p>
    </header>

    <!-- Productivity Heatmap -->
    <section class="px-4 mb-8">
        <div class="bg-zinc-900/40 rounded-[32px] p-6 border border-white/5">
            <div class="flex justify-between items-center mb-6">
                <button onclick="changeMonth(-1)" class="text-zinc-500">❮</button>
                <h2 id="month-label" class="text-red-400 font-black uppercase tracking-[0.2em] text-[10px]"></h2>
                <button onclick="changeMonth(1)" class="text-zinc-500">❯</button>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
        </div>
    </section>

    <!-- Week Strip (Structured Style) -->
    <section class="px-4 mb-4">
        <div class="flex justify-between items-center mb-4 px-2">
            <h3 class="text-zinc-500 font-black text-[10px] uppercase tracking-widest">Select Day</h3>
            <div class="flex gap-2">
                <button onclick="changeWeek(-1)" class="text-zinc-500 text-xs">❮</button>
                <button onclick="changeWeek(1)" class="text-zinc-500 text-xs">❯</button>
            </div>
        </div>
        <div id="week-strip" class="flex justify-between bg-zinc-900/20 p-2 rounded-3xl border border-white/5">
            <!-- Days injected by JS -->
        </div>
    </section>

    <!-- Main Timeline (Structured UI) -->
    <section class="px-6 pb-48 relative">
        <div class="absolute left-1/2 top-0 bottom-0 w-[2px] bg-zinc-800 -translate-x-1/2"></div>
        
        <div id="timeline-container" class="relative min-h-[800px] mt-10">
            <!-- Wake Icon -->
            <div class="absolute left-1/2 -top-10 -translate-x-1/2 w-10 h-10 bg-red-400 rounded-full flex items-center justify-center text-lg shadow-lg shadow-red-400/20 z-20">⏰</div>
            
            <div id="task-list" class="relative h-full w-full">
                <!-- Tasks pills will float here -->
            </div>

            <!-- Sleep Icon -->
            <div class="absolute left-1/2 bottom-[-40px] -translate-x-1/2 w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-lg shadow-lg shadow-blue-500/20 z-20">🌙</div>
        </div>
    </section>

    <!-- Command Center -->
    <div class="fixed bottom-8 left-4 right-4 max-w-md mx-auto z-[100]">
        <div class="bg-zinc-900/80 backdrop-blur-3xl border border-white/10 rounded-[35px] p-4 flex items-center justify-between shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-3xl" id="footer-emoji">😴</div>
                <div>
                    <p id="footer-status" class="text-[10px] text-blue-400 font-black uppercase tracking-widest">Next Up</p>
                    <p id="footer-title" class="text-base font-black truncate max-w-[120px]">Plan a task</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="markCurrentDone()" id="tick-btn" class="w-10 h-10 rounded-full border-2 border-white/10 flex items-center justify-center active:scale-90 transition">
                    <i data-lucide="check" class="text-green-400 opacity-0 transition-opacity"></i>
                </button>
                <button onclick="toggleModal(true)" class="bg-red-400 text-black w-12 h-12 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition">
                    <i data-lucide="plus" stroke-width="3"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Task Creator -->
    <div id="modal" class="fixed inset-0 bg-black/95 z-[200] hidden flex items-end">
        <div class="w-full bg-zinc-900 rounded-t-[50px] p-10 border-t border-white/10">
            <div class="flex justify-between items-center mb-8">
                <button onclick="toggleModal(false)" class="text-zinc-500 font-bold text-xs uppercase">Cancel</button>
                <button onclick="saveTask()" class="text-blue-400 font-black text-lg">Create</button>
            </div>
            <div class="flex items-center gap-6 mb-10">
                <input type="text" id="in-emoji" placeholder="📸" class="w-20 h-20 bg-white/5 text-4xl text-center rounded-[30px] border-none outline-none">
                <input type="text" id="in-title" placeholder="Activity Title" class="flex-1 bg-transparent text-2xl font-black outline-none">
            </div>
            <div class="space-y-4">
                <div class="bg-white/5 p-6 rounded-[35px] flex justify-between items-center">
                    <input type="time" id="in-start" value="12:00" class="bg-transparent text-red-400 font-black text-2xl border-none outline-none">
                    <div class="w-10 h-[1px] bg-zinc-800"></div>
                    <input type="time" id="in-end" value="13:00" class="bg-transparent text-white font-black text-2xl border-none outline-none text-right">
                </div>
                <div class="flex gap-2 overflow-x-auto no-scrollbar">
                    <button onclick="setColor('#f87171', this)" class="color-dot w-10 h-10 rounded-full bg-red-400 border-4 border-transparent active"></button>
                    <button onclick="setColor('#60a5fa', this)" class="color-dot w-10 h-10 rounded-full bg-blue-400 border-4 border-transparent"></button>
                    <button onclick="setColor('#4ade80', this)" class="color-dot w-10 h-10 rounded-full bg-green-400 border-4 border-transparent"></button>
                    <button onclick="setColor('#fbbf24', this)" class="color-dot w-10 h-10 rounded-full bg-yellow-400 border-4 border-transparent"></button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
